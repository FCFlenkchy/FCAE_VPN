name: build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'release tag (e.g. v1.0.0-gui)'
        required: true
        default: 'v1.0.0-gui'

permissions:
  contents: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: linux-x64
            cmake_args: >-
              -DCMAKE_BUILD_TYPE=Release
              -DAETHER_TARGET=LINUX_X64

          - target: x86_64-pc-windows-gnu
            name: windows-x64
            cmake_args: >-
              -DCMAKE_BUILD_TYPE=Release
              -DCMAKE_SYSTEM_NAME=Windows
              -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++
              -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc
              -DAETHER_TARGET=WIN_X64

          - target: aarch64-linux-android
            name: android-arm64
            cmake_args: "-DAETHER_TARGET=ANDROID_ARM64"

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ gcc cmake ninja-build \
            mingw-w64 g++-mingw-w64-x86-64 gcc-mingw-w64-x86-64 \
            libglfw3-dev libgl1-mesa-dev libx11-dev libxi-dev libxcursor-dev \
            pkg-config openjdk-17-jdk \
            libssl-dev libcurl4-openssl-dev libbz2-dev liblzma-dev \
            protobuf-compiler

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, x86_64-pc-windows-gnu, aarch64-linux-android
          components: rust-src

      - name: cache rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}
          workspaces: |
            aether -> aether/target
            crates/aether-ffi -> crates/aether-ffi/target
          cache-on-failure: true

      - name: cache cmake
        if: matrix.name != 'android-arm64'
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-${{ matrix.name }}-${{ hashFiles('CMakeLists.txt', 'src_cpp/**') }}
          restore-keys: cmake-${{ matrix.name }}-

      - name: cache gradle
        if: matrix.name == 'android-arm64'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: setup ndk
        if: matrix.name == 'android-arm64'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: fetch imgui
        run: |
          mkdir -p third_party
          if [ ! -d "third_party/imgui" ]; then
            git clone --depth 1 --branch v1.91.8 https://github.com/ocornut/imgui.git third_party/imgui
          fi

      - name: build engine
        run: cd aether && cargo build --release --target ${{ matrix.target }}

      - name: build ffi
        run: cd crates/aether-ffi && cargo build --release --target ${{ matrix.target }}

      - name: build frontend (linux)
        if: matrix.name == 'linux-x64'
        run: |
          mkdir -p build && cd build
          cmake .. -G Ninja -DCMAKE_CXX_COMPILER=g++ \
            ${{ matrix.cmake_args }} -DRUST_TARGET=${{ matrix.target }}
          cmake --build . --config Release

      - name: build frontend (windows)
        if: matrix.name == 'windows-x64'
        run: |
          mkdir -p build && cd build
          cmake .. -G Ninja \
            ${{ matrix.cmake_args }} -DRUST_TARGET=${{ matrix.target }}
          cmake --build . --config Release

      - name: build apk
        if: matrix.name == 'android-arm64'
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          if [ ! -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
            mkdir -p "$ANDROID_HOME/cmdline-tools"
            cd "$ANDROID_HOME/cmdline-tools"
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
            unzip -q tools.zip
            mv cmdline-tools latest
          fi
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

          cd android
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x ./gradlew
          ./gradlew assembleRelease -PNDK_ABI=arm64-v8a

      - name: package
        if: matrix.name != 'android'
        run: |
          mkdir -p package
          cp build/fcaevpn* package/ 2>/dev/null || true
          cp aether/target/${{ matrix.target }}/release/aether* package/ 2>/dev/null || true
          chmod +x package/* 2>/dev/null || true

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: fcaevpn-${{ matrix.name }}-${{ github.event.inputs.release_tag }}
          path: |
            package/
            android/app/build/outputs/apk/release/*.apk

      - name: release
        if: matrix.name == 'linux-x64'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: "fcaevpn ${{ github.event.inputs.release_tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
