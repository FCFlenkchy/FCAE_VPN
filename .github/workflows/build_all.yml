name: build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: linux-x64
            cmake_args: >-
              -DCMAKE_BUILD_TYPE=Release
              -DAETHER_TARGET=LINUX_X64

          - target: x86_64-pc-windows-gnu
            name: windows-x64
            cmake_args: >-
              -DCMAKE_BUILD_TYPE=Release
              -DCMAKE_SYSTEM_NAME=Windows
              -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++
              -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc
              -DAETHER_TARGET=WIN_X64

          - target: aarch64-linux-android
            name: android-arm64-v8a
            cmake_args: "-DAETHER_TARGET=ANDROID_ARM64"

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ gcc cmake ninja-build \
            mingw-w64 g++-mingw-w64-x86-64 gcc-mingw-w64-x86-64 \
            libglfw3-dev libgl1-mesa-dev libx11-dev libxi-dev libxcursor-dev \
            pkg-config openjdk-17-jdk \
            libssl-dev libcurl4-openssl-dev libbz2-dev liblzma-dev \
            protobuf-compiler upx-ucl \
            nasm golang-go
          # boring-sys / BoringSSL needs NASM for x86_64 (incl. MinGW cross builds)
          nasm -v

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, x86_64-pc-windows-gnu, aarch64-linux-android
          components: rust-src

      - name: cache rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}-inproc
          workspaces: |
            crates -> target
          cache-on-failure: true

      - name: cache cmake
        if: matrix.name != 'android-arm64-v8a'
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-${{ matrix.name }}-${{ hashFiles('CMakeLists.txt', 'src_cpp/**') }}
          restore-keys: cmake-${{ matrix.name }}-

      - name: cache gradle
        if: matrix.name == 'android-arm64-v8a'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: setup ndk
        id: setup-ndk
        if: matrix.name == 'android-arm64-v8a'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          link-to-sdk: true

      - name: fetch imgui
        run: |
          mkdir -p third_party
          if [ ! -d "third_party/imgui" ]; then
            git clone --depth 1 --branch v1.91.8 https://github.com/ocornut/imgui.git third_party/imgui
          fi

      - name: generate icon
        run: |
          python3 src_cpp/gen_icon.py src_cpp/icon.ico
          # Copy PNGs for Android/Linux
          cp src_cpp/icon_192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png 2>/dev/null || true
          cp src_cpp/icon_48.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png 2>/dev/null || true

      - name: build rust (engine + ffi, in-process)
        run: |
          set -euo pipefail

          # Android: ring/boring-sys need NDK clang (not aarch64-linux-android-clang on PATH by default)
          if [ "${{ matrix.name }}" = "android-arm64-v8a" ]; then
            NDK="${ANDROID_NDK_HOME:-${{ steps.setup-ndk.outputs.ndk-path }}}"
            if [ -z "$NDK" ] || [ ! -d "$NDK" ]; then
              echo "ANDROID_NDK_HOME not set or missing: $NDK"
              exit 1
            fi
            HOST_TAG=linux-x86_64
            PREBUILT="$NDK/toolchains/llvm/prebuilt/$HOST_TAG"
            BIN="$PREBUILT/bin"
            export PATH="$BIN:$PATH"
            export ANDROID_NDK_HOME="$NDK"
            export ANDROID_NDK_ROOT="$NDK"

            # API 24 matches minSdk in android/app/build.gradle.kts
            export CC_aarch64_linux_android="$BIN/aarch64-linux-android24-clang"
            export CXX_aarch64_linux_android="$BIN/aarch64-linux-android24-clang++"
            export AR_aarch64_linux_android="$BIN/llvm-ar"
            export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$BIN/aarch64-linux-android24-clang"
            export CARGO_TARGET_AARCH64_LINUX_ANDROID_AR="$BIN/llvm-ar"
            # Also set the dashed names some crates look for
            export CC_aarch64_linux_android="$BIN/aarch64-linux-android24-clang"
            # Symlink plain names ring/cc-rs may search for
            ln -sf "$BIN/aarch64-linux-android24-clang" "$BIN/aarch64-linux-android-clang"
            ln -sf "$BIN/aarch64-linux-android24-clang++" "$BIN/aarch64-linux-android-clang++"
            export CC=aarch64-linux-android24-clang
            export CXX=aarch64-linux-android24-clang++
            export AR=llvm-ar

            # bindgen / boring-sys
            export BINDGEN_EXTRA_CLANG_ARGS_aarch64_linux_android="--sysroot=$PREBUILT/sysroot"
            export CFLAGS_aarch64_linux_android="--sysroot=$PREBUILT/sysroot"
            export CXXFLAGS_aarch64_linux_android="--sysroot=$PREBUILT/sysroot"

            echo "Using NDK: $NDK"
            "$CC_aarch64_linux_android" --version | head -1
          fi

          # Workspace is crates/Cargo.toml so quiche keeps its own workspace.
          cargo build --manifest-path crates/Cargo.toml --release --target ${{ matrix.target }} -p aether-ffi
          # Normalize artifact location for CMake (CARGO_TARGET_DIR already points here)
          DEST="target/${{ matrix.target }}/release/libaether_ffi.a"
          mkdir -p "$(dirname "$DEST")"
          if [ -f "$DEST" ]; then
            ls -lh "$DEST"
          else
            for f in \
              crates/target/${{ matrix.target }}/release/libaether_ffi.a \
              crates/aether-ffi/target/${{ matrix.target }}/release/libaether_ffi.a; do
              if [ -f "$f" ]; then
                cp -f "$f" "$DEST"
                ls -lh "$DEST"
                break
              fi
            done
          fi
          test -f "$DEST"
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          RUSTFLAGS: ${{ matrix.name == 'windows-x64' && '-C target-feature=+crt-static -C link-args=-static-libgcc -C link-args=-static-libstdc++ -C link-args=-Wl,-Bstatic -C link-args=-lpthread -C link-args=-lwinpthread -C link-args=-Wl,-Bdynamic' || '' }}

      - name: build frontend (linux)
        if: matrix.name == 'linux-x64'
        run: |
          mkdir -p build && cd build
          cmake .. -G Ninja -DCMAKE_CXX_COMPILER=g++ \
            ${{ matrix.cmake_args }} -DRUST_TARGET=${{ matrix.target }}
          cmake --build . --config Release

      - name: build frontend (windows)
        if: matrix.name == 'windows-x64'
        run: |
          mkdir -p build && cd build
          cmake .. -G Ninja \
            ${{ matrix.cmake_args }} -DRUST_TARGET=${{ matrix.target }}
          cmake --build . --config Release

      - name: upx compress (windows)
        if: matrix.name == 'windows-x64'
        run: upx --best --lzma build/fcaevpn.exe 2>/dev/null || true

      - name: build apk
        if: matrix.name == 'android-arm64-v8a'
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          if [ ! -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
            mkdir -p "$ANDROID_HOME/cmdline-tools"
            cd "$ANDROID_HOME/cmdline-tools"
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
            unzip -q tools.zip
            mv cmdline-tools latest
          fi
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

          cd android
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x ./gradlew
          ./gradlew assembleRelease -PNDK_ABI=arm64-v8a

      - name: package
        if: matrix.name != 'android-arm64-v8a'
        run: |
          mkdir -p package
          # Standalone single binary — engine is linked into fcaevpn
          cp build/fcaevpn* package/ 2>/dev/null || true
          chmod +x package/* 2>/dev/null || true
          cd package
          for f in fcaevpn*; do
            [ -f "$f" ] || continue
            if [[ "$f" == *.exe ]]; then
              mv "$f" "FCAE_VPN-${{ matrix.name }}.exe"
            else
              mv "$f" "FCAE_VPN-${{ matrix.name }}"
            fi
          done
          ls -la
          # Sanity: only one artifact expected
          test $(ls -1 | wc -l) -ge 1

      - name: package (android)
        if: matrix.name == 'android-arm64-v8a'
        run: |
          mkdir -p package
          cp android/app/build/outputs/apk/release/*.apk package/FCAE_VPN-android-arm64-v8a.apk 2>/dev/null || true

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: FCAE_VPN-${{ matrix.name }}
          path: package/

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: "FCAE VPN ${{ github.event.inputs.release_tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
